name: Version Increment

permissions:
  id-token: write  # Required for OIDC npm
  contents: write

on:
  release:
    types: [created]
      
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: npm install -g npm@latest
      - run: npm install
      - run: npm run build
      - run: npm publish
